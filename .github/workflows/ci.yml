name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Checkout polygone (main repo)
        uses: actions/checkout@v4
        with:
          repository: gsrunion/polygone
          path: polygone-main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Publish polygone dependencies to mavenLocal
        working-directory: polygone-main
        run: ./gradlew publishToMavenLocal -x test

      - name: Build and test
        run: ./gradlew build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/
